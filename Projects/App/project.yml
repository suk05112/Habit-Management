# XcodeGen — 프로젝트 갱신: cd Projects/App && xcodegen generate
name: Habit Management
options:
  bundleIdPrefix: com.Habit-Management
  deploymentTarget:
    iOS: "15.2"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: ko

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 9.0.0
  Realm:
    url: https://github.com/realm/realm-swift
    exactVersion: 10.33.0
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    exactVersion: 1.6.0
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: 1.29.0

targets:
  Habit Management:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    resources:
      - Sources/Assets.xcassets
      - Sources/Preview Content
      - Sources/GoogleService-Info.plist
      - Sources/Localizable.xcstrings
    coreData:
      - CoreData/Habit_Management.xcdatamodeld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.Habit-Management
        INFOPLIST_FILE: Derived/InfoPlists/Habit Management-Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: ComposableArchitecture
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseAnalyticsSwift
      - package: Firebase
        product: FirebaseDatabase
      - package: Firebase
        product: FirebaseDatabaseSwift
      - package: Realm
        product: Realm
      - package: Realm
        product: RealmSwift
      - package: SwiftProtobuf
        product: SwiftProtobuf
      - package: SwiftProtobuf
        product: SwiftProtobufPluginLibrary

  Habit ManagementTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Sources
    dependencies:
      - target: Habit Management

  Habit ManagementUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests/Sources
    dependencies:
      - target: Habit Management

schemes:
  Habit Management:
    build:
      targets:
        Habit Management: all
    test:
      targets:
        - Habit ManagementTests
        - Habit ManagementUITests
