name: Build and Test

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Install Tuist
      run: |
        curl -Ls https://install.tuist.io | bash
        echo "${HOME}/.tuist/bin" >> $GITHUB_PATH
    
    - name: Cache Tuist dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.tuist/Cache
          ~/Library/Caches/com.tuist.tuist
        key: ${{ runner.os }}-tuist-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-tuist-
    
    - name: Generate Xcode project
      run: tuist generate
    
    - name: Build project
      run: |
        xcodebuild -workspace "Habit Management.xcworkspace" \
          -scheme "Habit Management" \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
          build
    
    - name: Run tests
      run: |
        xcodebuild -workspace "Habit Management.xcworkspace" \
          -scheme "Habit Management" \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
          test